name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Test (if configured)
        run: npm test --if-present

      - name: Backend module smoke check
        run: |
          node -e "require('./models/User');require('./utils/validators');require('./controllers/dashboardController');require('./controllers/visitController');console.log('backend smoke ok')"

  docker-integration-smoke:
    name: Docker integration smoke
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up -d --build db app

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting for app health... ($i/30)"
            sleep 5
          done
          echo "App did not become healthy in time"
          docker compose logs app
          exit 1

      - name: Dump compose status
        if: always()
        run: docker compose ps

      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs app

      - name: Shutdown containers
        if: always()
        run: docker compose down -v
